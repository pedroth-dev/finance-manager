# Finance Manager — stack local / VPS de testes (sem pagamentos)
# Uso: copie backend/.env.example para backend/.env e ajuste SECRET_KEY.
# Depois: docker compose up --build

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_manager
    ports:
      - "5432:5432"
    volumes:
      - fm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 8

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/finance_manager
      SECRET_KEY: ${SECRET_KEY:-troque-esta-chave-em-producao-use-secrets-token-hex}
      # Front via Docker na porta 8080 + dev local 5173
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  fm_pgdata:
